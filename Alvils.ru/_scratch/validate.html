<!DOCTYPE html><html><head><meta charset="utf-8">
<style>
/* real base + app rules (verbatim shapes from deployed style.css) */
.p-panelmenu .p-panelmenu-header-content{background-color:var(--menu-bgcolor)!important;color:var(--primary-txtcolor);padding:0}
.p-panelmenu .p-panelmenu-header-content .h{padding:13px 19px;color:var(--primary-txtcolor)}
.p-panelmenu .p-panelmenu-content{padding:.5rem 0;border:1px solid #dee2e6;background:#ffffff;color:#212529}
.p-panelmenu .p-panelmenu-content .p-menuitem:not(.p-highlight)>.p-menuitem-content:hover{background:#e9ecef}
.p-panelmenu .p-panelmenu-content .p-menuitem-link{display:block;text-decoration:none;border-right:4px solid transparent;padding:10px 0!important;background-color:var(--menu-bgcolor);color:var(--primary-txtcolor)}
.side-menu{background-color:var(--menu-bgcolor);width:220px;padding:8px 0}
.side-menu .menu-item{position:relative;display:flex;align-items:center;gap:8px;height:2.6rem;padding-left:1rem;color:var(--primary-txtcolor)}
.side-menu .menu-item:hover,.side-menu .menu-item.selected{background-color:var(--menu-selected-bgcolor);color:var(--menu-selected-color)}
.p-inputswitch{position:relative;display:inline-block;width:3rem;height:1.5rem}
.p-inputswitch .s{position:absolute;inset:0;background:var(--switcher-button);border-radius:4rem}
.p-inputswitch .s:before{content:"";position:absolute;background:var(--switcher-button-before);width:.95rem;height:.95rem;left:.27rem;top:50%;margin-top:-.48rem;border-radius:4rem}
.p-inputswitch.on .s{background:var(--switcher-button-bgcolor)}
.p-inputswitch.on .s:before{transform:translate(1.5rem)}
.p-button{background:var(--button-bgcolor);color:var(--button-txtcolor);border:none;border-radius:9999px;padding:9px 22px;font:600 14px Arial;cursor:pointer}
body{margin:0;font-family:Arial;display:flex;gap:16px;padding:16px}
.col{padding:14px;display:flex;flex-direction:column;gap:12px;width:250px}
.darkbg{background:var(--primary-bgcolor)}
.row{display:flex;align-items:center;gap:10px;color:var(--primary-txtcolor)}
.lbl{font:12px Arial;color:#888}
.pm{background:#fff} .darkbg .pm{background:var(--primary-bgcolor)}
</style>
<link rel="stylesheet" href="../customthemes.css">
</head><body>
<!-- LIGHT -->
<div class="col AlvilsLight">
  <div class="lbl">AlvilsLight</div>
  <div class="p-panelmenu pm" style="border:1px solid #dee2e6">
    <div class="p-panelmenu-content">
      <a class="p-menuitem-link router-link-active-exact" style="background:var(--menu-selected-bgcolor);color:var(--menu-selected-color)">Profile (active)</a>
      <a class="p-menuitem-link">Date &amp; Time (idle)</a>
      <a class="p-menuitem-link" style="background:var(--menu-selected-bgcolor);color:var(--menu-selected-color)">Security (hover)</a>
    </div>
  </div>
  <div class="side-menu">
    <div class="menu-item selected">&#9733; Home (selected)</div>
    <div class="menu-item">&#9734; Favorites (idle)</div>
  </div>
  <div class="row"><span class="p-inputswitch on"><span class="s"></span></span> ON
    &nbsp; <span class="p-inputswitch"><span class="s"></span></span> OFF</div>
  <button class="p-button">Sign In</button>
</div>
<!-- DARK -->
<div class="col AlvilsDark darkbg">
  <div class="lbl" style="color:#aaa">AlvilsDark</div>
  <div class="p-panelmenu pm">
    <div class="p-panelmenu-content" style="background:var(--primary-bgcolor);border-color:var(--border-color)">
      <a class="p-menuitem-link" style="background-color:var(--menu-selected-bgcolor)!important;color:var(--menu-selected-color)!important">Profile (active)</a>
      <a class="p-menuitem-link" style="color:var(--primary-txtcolor)">Date &amp; Time (idle)</a>
      <a class="p-menuitem-link" style="background-color:var(--menu-selected-bgcolor)!important;color:var(--menu-selected-color)!important">Security (hover)</a>
    </div>
  </div>
  <div class="side-menu" style="background:var(--menu-bgcolor)">
    <div class="menu-item selected">&#9733; Home (selected)</div>
    <div class="menu-item">&#9734; Favorites (idle)</div>
  </div>
  <div class="row"><span class="p-inputswitch on"><span class="s"></span></span> ON
    &nbsp; <span class="p-inputswitch"><span class="s"></span></span> OFF</div>
  <button class="p-button">Sign In</button>
</div>
</body></html>
