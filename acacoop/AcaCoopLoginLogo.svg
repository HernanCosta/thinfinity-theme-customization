<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 200" width="220" height="200">
  <!-- ACA mark, negative variant for the indigo brand panel:
       white letters + bottom arc, orange top arc (#f5951d kept from
       the official color logo). Geometry matches the site's white
       mark: large letters, arcs hugging the central C. -->
  <g fill="none" stroke-width="22" stroke-linecap="butt">
    <path d="M 58 56 A 70 70 0 0 1 162 56" stroke="#f5951d"/>
    <path d="M 58 150 A 70 70 0 0 0 162 150" stroke="#ffffff"/>
  </g>
  <text x="110" y="138" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif" font-weight="800"
        font-size="95" letter-spacing="-4" fill="#ffffff">ACA</text>
</svg>
